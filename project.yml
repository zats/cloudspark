name: Cloudspark
options:
  minimumXcodeGenVersion: 2.43.0
  projectFormat: xcode16_0
  deploymentTarget:
    macOS: "26.0"
  defaultSourceDirectoryType: syncedFolder
fileGroups:
  - path: Support/cloudflare2
    type: folder
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.zats.cloudspark2
    PRODUCT_NAME: Cloudspark
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Support/cloudflare2/Info.plist
    CODE_SIGN_ENTITLEMENTS: Support/cloudflare2/Cloudflare2.entitlements
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 5KE88HWMKJ
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  Cloudspark:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: syncedFolder
        excludes:
          - Assets.xcassets
      - path: Sources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Support/cloudflare2/Info.plist
        CODE_SIGN_ENTITLEMENTS: Support/cloudflare2/Cloudflare2.entitlements
